---
# ============================================================
# Rôle fileserver - Samba
# ============================================================

- name: Installer Samba
  ansible.builtin.apt:
    name:
      - samba
      - samba-common-bin
    state: present
    update_cache: yes

- name: Créer le dossier de partage
  ansible.builtin.file:
    path: /srv/shared
    state: directory
    mode: '0775'
    owner: nobody
    group: nogroup

- name: Créer quelques fichiers de démo
  ansible.builtin.copy:
    content: |
      Bienvenue sur le partage Samba de {{ inventory_hostname }}
      Date de création : {{ ansible_date_time.iso8601 }}
      
      Ce fichier sera sauvegardé par PBS.
    dest: "/srv/shared/{{ item }}"
    mode: '0664'
    owner: nobody
    group: nogroup
  loop:
    - readme.txt
    - document1.txt
    - document2.txt

- name: Configurer le partage Samba
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    mode: '0644'
    backup: yes
  notify: restart samba

- name: Démarrer et activer Samba
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - smbd
    - nmbd

- name: Afficher les infos d'accès
  ansible.builtin.debug:
    msg:
      - "Partage de fichiers prêt !"
      - "Accès : \\\\{{ ansible_host }}\\public"
      - "Linux : smb://{{ ansible_host }}/public"
